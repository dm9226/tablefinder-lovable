      <h1>TableFinder — Find Restaurant Reservations Across Multiple Platforms</h1>
      <p>TableFinder searches Resy, OpenTable, and Yelp simultaneously to find available restaurant reservations near you. Enter a natural language query like "Italian dinner for 2 tonight in Manhattan" and instantly see verified availability across all major booking platforms.</p>
